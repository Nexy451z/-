<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taming.io Type & Damage Simulator</title>
<style>
  :root {
    --bg-color: #f6f8fa;
    --box-bg: #ffffff;
    --text-main: #24292f;
    --text-muted: #57606a;
    --border-color: #d0d7de;
    --accent-color: #0969da;
    --success-color: #1a7f37;
    --danger-color: #cf222e;
    --success-bg: #dafbe1;
    --danger-bg: #ffebe9;

    /* Type Colors */
    --type-normal: #d0bea1;
    --type-rock: #a18658;
    --type-water: #37c4c0;
    --type-electric: #e0c235;
    --type-plant: #8dae38;
    --type-poison: #7b78b8;
    --type-insect: #fd8b1e;
    --type-combat: #df4e2c;
    --type-fire: #e57619;
    --type-ice: #45d6d1;
    --type-spectrum: #8f94d8;
    --type-dragon: #bddfd8;
    --type-fairy: #ef72a6;
    --type-ancient: #a5953a;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    margin: 0;
    padding: 0;
    line-height: 1.5;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Header */
  .header {
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 16px;
  }
  .header h1 {
    font-size: 24px;
    margin: 0 0 8px;
    font-weight: 600;
  }
  .header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Layout */
  .layout-grid {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .main-content {
    flex-grow: 1;
    min-width: 0;
  }

  .matchup-grids {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  /* Box Styles */
  .box {
    background-color: var(--box-bg);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 16px;
  }
  .box h3 {
    margin: 0 0 16px;
    font-size: 16px;
    font-weight: 600;
  }
  .box-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .box-header h3 {
    margin: 0;
  }

  /* Form Elements */
  input[type="text"], select {
    padding: 5px 12px;
    font-size: 14px;
    line-height: 20px;
    color: var(--text-main);
    background-color: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    width: 100%;
    box-sizing: border-box;
    transition: 0.2s ease-in-out;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent-color);
    outline: none;
    box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
  }

  /* Tables */
  .table-container {
    overflow-y: auto;
    max-height: 600px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
    text-align: left;
    white-space: nowrap;
  }
  th {
    background-color: var(--bg-color);
    font-weight: 600;
    color: var(--text-muted);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background-color: var(--box-bg);
    filter: brightness(0.96);
  }

  /* Type Badges */
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    line-height: 18px;
    border-radius: 2em;
    margin-right: 4px;
    margin-bottom: 4px;
    border: 1px solid rgba(0,0,0,0.1);
  }
  .type-container {
    min-height: 24px;
  }

  /* Colors for Badges */
  .type-Normal { background-color: var(--type-normal); color: #000; }
  .type-Rock { background-color: var(--type-rock); color: #fff; }
  .type-Water { background-color: var(--type-water); color: #000; }
  .type-Electric { background-color: var(--type-electric); color: #000; }
  .type-Plant { background-color: var(--type-plant); color: #000; }
  .type-Poison { background-color: var(--type-poison); color: #fff; }
  .type-Insect { background-color: var(--type-insect); color: #000; }
  .type-Combat { background-color: var(--type-combat); color: #fff; }
  .type-Fire { background-color: var(--type-fire); color: #fff; }
  .type-Ice { background-color: var(--type-ice); color: #000; }
  .type-Spectrum { background-color: var(--type-spectrum); color: #000; }
  .type-Dragon { background-color: var(--type-dragon); color: #000; }
  .type-Fairy { background-color: var(--type-fairy); color: #000; }
  .type-Ancient { background-color: var(--type-ancient); color: #fff; }

  /* Multiplier Text Colors */
  .mul-good { color: var(--success-color); font-weight: 600; }
  .mul-bad { color: var(--danger-color); font-weight: 600; }
  .mul-neutral { color: var(--text-muted); }

  /* Type Chart Styles */
  .type-chart-table th, .type-chart-table td {
    text-align: center;
    min-width: 50px;
    border-right: 1px solid var(--border-color);
  }
  .type-chart-table th:first-child {
    position: sticky;
    left: 0;
    z-index: 3;
  }
  .bg-good { background-color: var(--success-bg) !important; color: var(--success-color); font-weight: 600; }
  .bg-bad { background-color: var(--danger-bg) !important; color: var(--danger-color); font-weight: 600; }

  .mt-4 { margin-top: 24px; }

  @media (max-width: 1024px) {
    .matchup-grids {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    .layout-grid {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Taming.io Type Matchup List</h1>
    <p>動物を1体選択し、攻撃時・防御時それぞれの全動物に対する相性を確認できます</p>
  </div>

  <div class="layout-grid">
    <!-- Sidebar: Controls -->
    <div class="sidebar">
      <div class="box">
        <h3>Select Animal</h3>
        <select id="animal-select"></select>
        <div class="mt-4"></div>
        <div id="animal-types" class="type-container"></div>
      </div>

      <div class="box">
        <h3>Filter</h3>
        <input type="text" id="search-input" class="search-bar" placeholder="Filter by animal name...">
      </div>
    </div>

    <!-- Main Content: Matchup Tables -->
    <div class="main-content">
      <div class="matchup-grids">
        
        <!-- Attack Table -->
        <div class="box">
          <div class="box-header">
            <h3>Attacking (vs Defender)</h3>
          </div>
          <div class="table-container">
            <table id="attack-table">
              <thead>
                <tr>
                  <th>Defender</th>
                  <th>Types</th>
                  <th>Multiplier</th>
                </tr>
              </thead>
              <tbody id="attack-tbody">
              </tbody>
            </table>
          </div>
        </div>

        <!-- Defense Table -->
        <div class="box">
          <div class="box-header">
            <h3>Defending (vs Attacker)</h3>
          </div>
          <div class="table-container">
            <table id="defense-table">
              <thead>
                <tr>
                  <th>Attacker</th>
                  <th>Types</th>
                  <th>Multiplier</th>
                </tr>
              </thead>
              <tbody id="defense-tbody">
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Full Type Chart -->
  <div class="box mt-4">
    <h3>Base Type Chart</h3>
    <div class="table-container">
      <table id="type-chart" class="type-chart-table"></table>
    </div>
  </div>
</div>

<script>
  // タイプの定義
  const types = [
    "Normal", "Rock", "Water", "Electric", "Plant", "Poison", "Insect", 
    "Combat", "Fire", "Ice", "Spectrum", "Dragon", "Fairy", "Ancient"
  ];

  // 1対1の基本タイプ相性
  const typeRelations = {
    Normal: { Normal: 1, Rock: 0.5, Water: 1, Electric: 1, Plant: 1, Poison: 1, Insect: 1, Combat: 1, Fire: 1, Ice: 1, Spectrum: 0.5, Dragon: 1, Fairy: 1, Ancient: 1 },
    Rock: { Normal: 1, Rock: 1, Water: 1, Electric: 2, Plant: 1, Poison: 2, Insect: 2, Combat: 0.5, Fire: 2, Ice: 2, Spectrum: 1, Dragon: 1, Fairy: 2, Ancient: 0.5 },
    Water: { Normal: 1, Rock: 2, Water: 0.5, Electric: 1, Plant: 0.5, Poison: 1, Insect: 1, Combat: 1, Fire: 2, Ice: 1, Spectrum: 1, Dragon: 0.5, Fairy: 1, Ancient: 1 },
    Electric: { Normal: 1, Rock: 0.5, Water: 2, Electric: 0.5, Plant: 0.5, Poison: 1, Insect: 1, Combat: 1, Fire: 1, Ice: 1, Spectrum: 1, Dragon: 0.5, Fairy: 2, Ancient: 1 },
    Plant: { Normal: 1, Rock: 2, Water: 2, Electric: 1, Plant: 0.5, Poison: 0.5, Insect: 0.5, Combat: 1, Fire: 0.5, Ice: 1, Spectrum: 1, Dragon: 0.5, Fairy: 1, Ancient: 1 },
    Poison: { Normal: 1, Rock: 0.5, Water: 1, Electric: 1, Plant: 2, Poison: 0.5, Insect: 0.5, Combat: 2, Fire: 1, Ice: 1, Spectrum: 2, Dragon: 1, Fairy: 1, Ancient: 1 },
    Insect: { Normal: 1, Rock: 1, Water: 1, Electric: 1, Plant: 2, Poison: 2, Insect: 1, Combat: 0.5, Fire: 0.5, Ice: 1, Spectrum: 0.5, Dragon: 1, Fairy: 0.5, Ancient: 1 },
    Combat: { Normal: 2, Rock: 2, Water: 1, Electric: 1, Plant: 1, Poison: 0.5, Insect: 0.5, Combat: 1, Fire: 1, Ice: 2, Spectrum: 0.5, Dragon: 1, Fairy: 0.5, Ancient: 1 },
    Fire: { Normal: 1, Rock: 0.5, Water: 0.5, Electric: 1, Plant: 2, Poison: 1, Insect: 2, Combat: 1, Fire: 0.5, Ice: 2, Spectrum: 1, Dragon: 0.5, Fairy: 1, Ancient: 2 },
    Ice: { Normal: 1, Rock: 1, Water: 0.5, Electric: 1, Plant: 2, Poison: 1, Insect: 1, Combat: 1, Fire: 0.5, Ice: 0.5, Spectrum: 1, Dragon: 2, Fairy: 1, Ancient: 1 },
    Spectrum: { Normal: 2, Rock: 1, Water: 1, Electric: 1, Plant: 1, Poison: 0.5, Insect: 1, Combat: 2, Fire: 1, Ice: 1, Spectrum: 0.5, Dragon: 1, Fairy: 0.5, Ancient: 1 },
    Dragon: { Normal: 1, Rock: 1, Water: 1, Electric: 1, Plant: 1, Poison: 1, Insect: 1, Combat: 1, Fire: 1, Ice: 1, Spectrum: 1, Dragon: 2, Fairy: 0.5, Ancient: 1 },
    Fairy: { Normal: 1, Rock: 0.5, Water: 1, Electric: 1, Plant: 1, Poison: 1, Insect: 1, Combat: 2, Fire: 0.5, Ice: 1, Spectrum: 2, Dragon: 2, Fairy: 1, Ancient: 1 },
    Ancient: { Normal: 1, Rock: 2, Water: 1, Electric: 2, Plant: 1, Poison: 1, Insect: 2, Combat: 1, Fire: 2, Ice: 0.5, Spectrum: 1, Dragon: 0.5, Fairy: 2, Ancient: 0.5 }
  };

  // 動物のリスト
  const animals = {
    "Acidog": ["Poison"],
    "Adoring Shadow": ["Insect", "Plant"],
    "Ancient Boostling": ["Ancient"],
    "Armadillo": ["Rock"],
    "Axolotl": ["Water"],
    "Barn Owl": ["Spectrum"],
    "Bat": ["Spectrum"],
    "Bear": ["Water"],
    "Black Cat": ["Spectrum"],
    "Black Spider": ["Poison"],
    "Boar": ["Poison"],
    "Bugdog": ["Insect"],
    "Bull": ["Rock"],
    "Camel": ["Water"],
    "Caracal": ["Normal"],
    "Coldog": ["Ice"],
    "Combat Boostling": ["Combat"],
    "Combat Fairy": ["Fairy", "Combat"],
    "Cow": ["Normal"],
    "Cratodon": ["Ancient"],
    "Dark Wisp": ["Spectrum"],
    "Deer": ["Plant"],
    "Digger Shadow": ["Insect", "Combat"],
    "Dog": ["Normal"],
    "Draconic Gaze": ["Dragon"],
    "Dragon": ["Dragon"],
    "Dragon Boostling": ["Dragon"],
    "Dragon Fairy": ["Fairy", "Dragon"],
    "Easter Bunny": ["Normal"],
    "Electric Boostling": ["Electric"],
    "Electric Fairy": ["Fairy", "Electric"],
    "Enchanting Gaze": ["Fairy"],
    "Fairy Boostling": ["Fairy"],
    "Fennec Fox": ["Fire"],
    "Fire Boostling": ["Fire"],
    "Fire Dragon": ["Dragon", "Fire"],
    "Fire Fairy": ["Fairy", "Fire"],
    "Fire Statue": ["Rock", "Fire"],
    "Fire Wisp": ["Fire"],
    "Floodog": ["Water"],
    "Flying Squirrel": ["Plant"],
    "Fox": ["Electric"],
    "Genie": ["Fairy"],
    "Giant Bee": ["Insect"],
    "Giant Mantis": ["Insect"],
    "Giant Moth": ["Insect"],
    "Glacial Gaze": ["Ice"],
    "Gold Golem": ["Rock"],
    "Goldfish": ["Water"],
    "Guardian Shadow": ["Insect", "Ice"],
    "Hedgehog": ["Fire"],
    "Hellhound": ["Fire", "Spectrum"],
    "Horse": ["Fire"],
    "Ibex": ["Rock"],
    "Ice Boostling": ["Ice"],
    "Ice Dragon": ["Dragon", "Ice"],
    "Ice Fairy": ["Fairy", "Ice"],
    "Ice Golem": ["Ice"],
    "Ice Mask": ["Ice", "Plant"],
    "Iceberg": ["Ice"],
    "Inferno Gaze": ["Fire"],
    "Infesting Gaze": ["Insect"],
    "Insect Boostling": ["Insect"],
    "Insect Fairy": ["Fairy", "Insect"],
    "Kangaroo": ["Combat"],
    "Krampus": ["Spectrum"],
    "Lava Golem": ["Fire"],
    "Living Mushroom": ["Combat"],
    "Lizardman": ["Combat"],
    "Lynx": ["Combat"],
    "Mammoth": ["Rock", "Ancient"],
    "Mantle": ["Rock"],
    "Mauve": ["Normal"],
    "Menhir": ["Rock"],
    "Normal Boostling": ["Normal"],
    "Normal Fairy": ["Fairy", "Normal"],
    "Normal Mask": ["Normal", "Plant"],
    "Octopus": ["Water"],
    "Oryx": ["Rock"],
    "Ostrich": ["Electric"],
    "Penguin": ["Ice"],
    "Plant Boostling": ["Plant"],
    "Plant Fairy": ["Fairy", "Plant"],
    "Plant Mask": ["Plant"],
    "Plant Statue": ["Rock", "Plant"],
    "Poison Boostling": ["Poison"],
    "Poison Fairy": ["Fairy", "Poison"],
    "Polar Bear": ["Ice"],
    "Polecat": ["Poison"],
    "Pudgy Shadow": ["Insect", "Water"],
    "Punchy Gaze": ["Combat"],
    "Rabbat": ["Spectrum"],
    "Rabbid": ["Combat"],
    "Rabbit": ["Plant"],
    "Rabblow": ["Rock"],
    "Rabburn": ["Fire"],
    "Rabbyss": ["Water"],
    "Rat": ["Electric"],
    "Raven": ["Spectrum"],
    "Reaper": ["Fairy"],
    "Reindeer": ["Normal"],
    "Rexdog": ["Ancient"],
    "Rock Boostling": ["Rock"],
    "Rock Fairy": ["Fairy", "Rock"],
    "Rock Mask": ["Rock", "Plant"],
    "Salamander": ["Fire"],
    "Savant Shadow": ["Insect", "Spectrum"],
    "Scrappy Shadow": ["Insect", "Fire"],
    "Sea Crab": ["Water"],
    "Seahorse": ["Water"],
    "Seal": ["Ice"],
    "Shark": ["Combat"],
    "Sheep": ["Electric"],
    "Siren": ["Rock", "Water"],
    "Skunk": ["Poison"],
    "Slime": ["Poison"],
    "Snow Fox": ["Ice"],
    "Snow Rabbit": ["Ice"],
    "Snow Wolf": ["Ice"],
    "Snowball": ["Ice"],
    "Snowman": ["Ice"],
    "Spectral Gaze": ["Spectrum"],
    "Spectrum": ["Spectrum"],
    "Spectrum Boostling": ["Spectrum"],
    "Spectrum Fairy": ["Fairy", "Spectrum"],
    "Squid": ["Poison"],
    "Stingray": ["Electric"],
    "Stone Golem": ["Rock"],
    "Tambidi": ["Poison"],
    "Toad": ["Water"],
    "Turkey": ["Plant"],
    "Unicorn": ["Spectrum"],
    "Volcanic Golem": ["Rock", "Fire"],
    "Vulture": ["Spectrum"],
    "Warg": ["Spectrum"],
    "Water Boostling": ["Water"],
    "Water Fairy": ["Fairy", "Water"],
    "Water Mask": ["Water", "Plant"],
    "Water Statue": ["Rock", "Water"],
    "White Spider": ["Normal"],
    "Wolf": ["Fire"],
    "Yellow Scorpion": ["Poison"],
    "Yeti": ["Ice", "Combat"]
  };

  /**
   * 倍率計算ロジック
   */
  function getMultiplier(atkTypes, defTypes) {
    let weakness = 0;
    let resistance = 0;

    atkTypes.forEach(a => {
      defTypes.forEach(d => {
        let val = typeRelations[a][d];
        if (val > 1) weakness++;
        if (val < 1) resistance++;
      });
    });

    let diff = weakness - resistance;
    if (diff > 0) {
      return 1 + diff; // 1 -> 2x, 2 -> 3x
    } else if (diff < 0) {
      return Math.pow(0.5, Math.abs(diff)); // -1 -> 0.5x, -2 -> 0.25x
    }
    return 1;
  }

  // 攻撃時の倍率表示 (与えるダメージが大きい＝緑、小さい＝赤)
  function formatAttackMultiplier(val) {
    if (val > 1) return `<span class="mul-good">${val}x</span>`;
    if (val < 1) return `<span class="mul-bad">${val}x</span>`;
    return `<span class="mul-neutral">${val}x</span>`;
  }

  // 防御時の倍率表示 (受けるダメージが大きい＝赤、小さい＝緑)
  function formatDefenseMultiplier(val) {
    if (val > 1) return `<span class="mul-bad">${val}x</span>`;  // 弱点
    if (val < 1) return `<span class="mul-good">${val}x</span>`; // 耐性
    return `<span class="mul-neutral">${val}x</span>`;
  }

  // タイプバッジのHTML
  function createTypeBadge(type) {
    return `<span class="type-badge type-${type}">${type}</span>`;
  }

  // 初期化
  window.onload = () => {
    const animalSelect = document.getElementById('animal-select');
    const animalNames = Object.keys(animals).sort();
    
    animalNames.forEach(name => {
      animalSelect.add(new Option(name, name));
    });

    // 初期選択
    animalSelect.selectedIndex = animalNames.indexOf("Fire Dragon") !== -1 ? animalNames.indexOf("Fire Dragon") : 0;
    animalSelect.addEventListener('change', updateApp);

    // 検索フィルター処理
    document.getElementById('search-input').addEventListener('input', function() {
      const filter = this.value.toLowerCase();
      // Attack Table
      const attackRows = document.querySelectorAll('#attack-tbody tr');
      attackRows.forEach(row => {
        const name = row.children[0].innerText.toLowerCase();
        row.style.display = name.includes(filter) ? '' : 'none';
      });
      // Defense Table
      const defenseRows = document.querySelectorAll('#defense-tbody tr');
      defenseRows.forEach(row => {
        const name = row.children[0].innerText.toLowerCase();
        row.style.display = name.includes(filter) ? '' : 'none';
      });
    });

    buildTypeChart();
    updateApp();
  };

  function updateApp() {
    const selected = document.getElementById('animal-select').value;
    const selectedTypes = animals[selected];

    document.getElementById('animal-types').innerHTML = selectedTypes.map(createTypeBadge).join('');

    updateMatchupTables(selected);
    // 更新後に検索フィルタを再適用
    document.getElementById('search-input').dispatchEvent(new Event('input'));
  }

  function updateMatchupTables(selected) {
    const atkBody = document.getElementById('attack-tbody');
    const defBody = document.getElementById('defense-tbody');
    atkBody.innerHTML = '';
    defBody.innerHTML = '';
    
    const selectedTypes = animals[selected];
    const animalNames = Object.keys(animals).sort();
    
    const attackRows = [];
    const defenseRows = [];

    animalNames.forEach(target => {
      const targetTypes = animals[target];
      
      // 攻撃時：選んだ動物が攻撃、相手が防御
      const atkMul = getMultiplier(selectedTypes, targetTypes);
      attackRows.push({ target, types: targetTypes, mul: atkMul });

      // 防御時：相手が攻撃、選んだ動物が防御
      const defMul = getMultiplier(targetTypes, selectedTypes);
      defenseRows.push({ target, types: targetTypes, mul: defMul });
    });

    // 与えるダメージが大きい順（得意な相手が上）
    attackRows.sort((a, b) => b.mul - a.mul);
    // 受けるダメージが大きい順（天敵・苦手な相手が上）
    defenseRows.sort((a, b) => b.mul - a.mul);

    attackRows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${row.target}</strong></td>
        <td>${row.types.map(createTypeBadge).join('')}</td>
        <td>${formatAttackMultiplier(row.mul)}</td>
      `;
      atkBody.appendChild(tr);
    });

    defenseRows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${row.target}</strong></td>
        <td>${row.types.map(createTypeBadge).join('')}</td>
        <td>${formatDefenseMultiplier(row.mul)}</td>
      `;
      defBody.appendChild(tr);
    });
  }

  function buildTypeChart() {
    const table = document.getElementById('type-chart');
    
    let thead = '<thead><tr><th>Atk \\ Def</th>';
    types.forEach(t => {
      thead += `<th>${createTypeBadge(t)}</th>`;
    });
    thead += '</tr></thead>';

    let tbody = '<tbody>';
    types.forEach(atk => {
      tbody += `<tr><th>${createTypeBadge(atk)}</th>`;
      types.forEach(def => {
        const val = typeRelations[atk][def];
        let colorClass = '';
        if (val > 1) colorClass = 'bg-good';
        else if (val < 1) colorClass = 'bg-bad';
        tbody += `<td class="${colorClass}">${val}x</td>`;
      });
      tbody += '</tr>';
    });
    tbody += '</tbody>';

    table.innerHTML = thead + tbody;
  }
</script>

</body>
</html>
